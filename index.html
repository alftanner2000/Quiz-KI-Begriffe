<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>KI-Quizshow</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 40px;
}
.box {
  max-width: 700px;
  margin: auto;
}
button {
  font-size: 18px;
  padding: 15px 25px;
  margin: 10px;
  cursor: pointer;
  width: 80%;
}
</style>
</head>
<body>

<div class="box">
<h1>KI-Quizshow 🚀</h1>

<p>
1. Modus auswählen<br>
2. Button klicken (Prompt wird kopiert)<br>
3. In ChatGPT (oder andere KI) einfügen<br>
4. Enter drücken & spielen 🎯
</p>

<button onclick="copyQuiz1()">🎤 Klassische Quizshow</button>
<button onclick="copyQuiz2()">⚡ Schnelles Quiz (Blitzrunde)</button>
<button onclick="copyQuiz3()">🎮 Challenge-Modus</button>

<p id="msg"></p>
</div>

<script>

function copyQuiz1() {
const text = `Du bist der Moderator einer unterhaltsamen Quizshow zum Thema Künstliche Intelligenz.

Ziel:
Die Teilnehmenden sollen spielerisch folgende Begriffe lernen:
LLM, Computer Vision, Prompt, Token, Training, Daten, Kontext, Halluzination, Bias, Multimodalität

Stil:
- wie eine echte Quizshow 🎤
- motivierend, leicht humorvoll
- kurze, klare Fragen

Stelle immer nur eine Frage und warte auf die Antwort.`;
copy(text);
}

function copyQuiz2() {
const text = `Du bist ein schneller Quizmaster.

Erstelle eine Blitzrunde zum Thema KI-Begriffe:
LLM, Prompt, Token, Kontext, Bias

Regeln:
- sehr kurze Fragen
- sofort nächste Frage
- max. Tempo
- einfache Sprache

Stelle immer nur eine Frage.`;
copy(text);
}

function copyQuiz3() {
const text = `Du bist ein Herausforderer in einem KI-Quiz.

Teste mich zu:
LLM, Computer Vision, Halluzination, Multimodalität

Mach es anspruchsvoller:
- kleine Szenarien
- knifflige Fragen
- steigende Schwierigkeit

Nach jeder Antwort kurze Erklärung.`;
copy(text);
}

function copy(text) {
navigator.clipboard.writeText(text);
document.getElementById("msg").innerText = "✅ Prompt kopiert!";
}

</script>

</body>
</html>
